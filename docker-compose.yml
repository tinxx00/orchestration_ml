# ==============================================================================
# docker-compose.yml — orchestration de la stack — à compléter (TP S14)
# ==============================================================================

services:

  # --------------------------------------------------------------------------
  # MLflow Tracking Server
  # --------------------------------------------------------------------------
  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow
    command: >
      mlflow server
      --backend-store-uri sqlite:///mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts
      --serve-artifacts
      --allowed-hosts mlflow,mlflow:5000,localhost,localhost:5000,127.0.0.1,127.0.0.1:5000,141.253.121.52,141.253.121.52:5000
      --cors-allowed-origins http://localhost:5000,http://127.0.0.1:5000,http://141.253.121.52:5000
      --host 0.0.0.0
      --port 5000

  # --------------------------------------------------------------------------
  # API FastAPI
  # --------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    ports:
      - "8000:8000"
    depends_on:
      - mlflow
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    volumes:
      - ./models:/app/models
      - mlflow_data:/mlflow

  # --------------------------------------------------------------------------
  # Entraînement (profil optionnel)
  # --------------------------------------------------------------------------
  train:
    build:
      context: .
      dockerfile: docker/Dockerfile.train
    profiles:
      - train
    depends_on:
      - mlflow
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    volumes:
      - ./models:/app/models
      - mlflow_data:/mlflow

  # --------------------------------------------------------------------------
  # Frontend Streamlit
  # --------------------------------------------------------------------------
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "8502:8501"
    depends_on:
      - api
    environment:
      - API_URL=http://api:8000
      - MLFLOW_URL=http://mlflow:5000
      - AIRFLOW_URL=http://airflow:8080
      - API_PUBLIC_URL=${API_PUBLIC_URL:-http://localhost:8000}
      - MLFLOW_PUBLIC_URL=${MLFLOW_PUBLIC_URL:-http://localhost:5000}
      - AIRFLOW_PUBLIC_URL=${AIRFLOW_PUBLIC_URL:-http://localhost:8080}
      - AIRFLOW_USER=admin
      - AIRFLOW_PASSWORD=admin
    volumes:
      - ./data:/app/data
      - ./models:/app/models

  # --------------------------------------------------------------------------
  # Airflow (scheduler + webserver dans un seul conteneur, SQLite)
  # --------------------------------------------------------------------------
  airflow:
    build:
      context: .
      dockerfile: docker/Dockerfile.airflow
    ports:
      - "8080:8080"
    depends_on:
      - api
      - mlflow
    environment:
      - AIRFLOW__CORE__EXECUTOR=SequentialExecutor
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__WEBSERVER__EXPOSE_CONFIG=True
      - AIRFLOW__API__AUTH_BACKENDS=airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session
      - AIRFLOW__WEBSERVER__WORKERS=2
      - AIRFLOW__WEBSERVER__WORKER_REFRESH_INTERVAL=0
      - AIRFLOW__WEBSERVER__WEB_SERVER_WORKER_TIMEOUT=300
      - PYTHONPATH=/opt/airflow/src
      - API_URL=http://api:8000
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    volumes:
      - ./dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
      - ./data:/opt/airflow/data
      - ./models:/opt/airflow/models
      - airflow_data:/opt/airflow
      - mlflow_data:/mlflow
    command: >
      bash -c "
      airflow db migrate;
      airflow users create --username admin --password admin
        --firstname Admin --lastname User --role Admin --email admin@example.com || true;
      airflow scheduler &
      exec airflow webserver
      "

volumes:
  mlflow_data:
  airflow_data:
