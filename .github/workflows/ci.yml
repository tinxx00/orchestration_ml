name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Qualite (lint + types + tests)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du depot
        uses: actions/checkout@v4

      - name: Installation de uv (avec cache)
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Installation des dependances (projet + dev)
        run: uv sync --extra dev

      - name: Lint (ruff)
        run: uv run ruff check src/heart

      - name: Types (mypy)
        run: uv run mypy src/heart

      # - name: Tests (pytest)
      #   run: uv run pytest

      - name: Tests (temporairement desactives)
        run: echo "Tests non actives pour le moment"

  train:
    name: Entrainement (Continuous Training)
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout du depot
        uses: actions/checkout@v4

      - name: Installation de uv (avec cache)
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Installation des dependances
        run: uv sync --extra dev

      - name: Donnees + entrainement de la baseline
        run: |
          PYTHONPATH=src uv run python -m heart.train

      - name: Publication du modele en artefact
        uses: actions/upload-artifact@v4
        with:
          name: model
          path: models/model.joblib
