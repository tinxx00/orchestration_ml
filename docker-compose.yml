# ==============================================================================
# docker-compose.yml — orchestration de la stack — à compléter (TP S14)
# ==============================================================================

services:

  # --------------------------------------------------------------------------
  # MLflow Tracking Server
  # --------------------------------------------------------------------------
  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow
    command: >
      mlflow server
      --backend-store-uri sqlite:///mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts
      --host 0.0.0.0
      --port 5000

  # --------------------------------------------------------------------------
  # API FastAPI
  # --------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    ports:
      - "8000:8000"
    depends_on:
      - mlflow
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    volumes:
      - ./models:/app/models

  # --------------------------------------------------------------------------
  # Entraînement (profil optionnel)
  # --------------------------------------------------------------------------
  train:
    build:
      context: .
      dockerfile: docker/Dockerfile.train
    profiles:
      - train
    depends_on:
      - mlflow
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    volumes:
      - ./models:/app/models

  # --------------------------------------------------------------------------
  # Frontend Streamlit
  # --------------------------------------------------------------------------
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "8502:8501"
    depends_on:
      - api
    environment:
      - API_URL=http://api:8000

volumes:
  mlflow_data:
