name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Sync dependencies
        run: uv sync --extra dev

      - name: Makefile help
        run: make help

      - name: Python compile check
        run: |
          PYTHONPATH=src uv run python -m py_compile \
            src/heart/train.py \
            src/heart/train_optuna.py \
            src/heart/evaluation.py \
            src/heart/api.py \
            scripts/predict_client.py
